name: Desktop Release

# Builds Tauri desktop installers and attaches them to the GitHub release
# for the pushed tag. The desktop app is a native shell that loads the
# production deployment, so no Next.js build or env secrets are needed.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build installers for (e.g. v0.4.0)'
        required: true

# tauri-action creates/updates the GitHub release and uploads installer
# assets — needs write access (default GITHUB_TOKEN is read-only).
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            bundles: deb,appimage
          - platform: windows-latest
            bundles: msi,nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build and upload installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'Front Line Whānau ${{ github.event.inputs.tag || github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: --bundles ${{ matrix.bundles }}
